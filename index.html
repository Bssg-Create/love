<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小兴子 & 小婷宝</title>
<style>
:root {
  --pink: #ff6b9d;
  --pink-light: #ffb6c1;
  --pink-bg: #fff5f7;
  --dark: #c44569;
  --white: #ffffff;
  --text: #4a3040;
  --text-muted: #8a6a7a;
  --shadow: 0 4px 20px rgba(255,107,157,0.15);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,sans-serif;
  background: var(--pink-bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ====== Entrance Page ====== */
#entrance {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #fff5f7 0%, #ffe0e8 30%, #ffb6c1 70%, #ff9ab5 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; transition: opacity 0.6s, visibility 0.6s;
}
#entrance.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.entrance-card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 3rem 2.5rem;
  text-align: center;
  box-shadow: 0 8px 40px rgba(255,107,157,0.2);
  max-width: 420px; width: 90%;
  animation: fadeInUp 0.8s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.entrance-card h1 {
  font-size: 2rem; color: var(--dark);
  margin-bottom: 0.5rem; letter-spacing: 2px;
}
.entrance-card .hearts { font-size: 1.5rem; margin-bottom: 1rem; }
.entrance-card label {
  display: block; color: var(--text-muted);
  font-size: 0.95rem; margin-bottom: 0.75rem;
}
.entrance-card input[type="date"] {
  width: 100%; padding: 0.8rem 1rem;
  border: 2px solid #ffd0de; border-radius: 12px;
  font-size: 1rem; text-align: center; color: var(--text);
  background: var(--white); outline: none;
  transition: border-color 0.3s;
}
.entrance-card input[type="date"]:focus { border-color: var(--pink); }
.entrance-card .btn-enter {
  margin-top: 1.5rem; padding: 0.8rem 3rem;
  background: var(--pink); color: white;
  border: none; border-radius: 50px;
  font-size: 1.1rem; cursor: pointer;
  letter-spacing: 1px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(255,107,157,0.3);
}
.entrance-card .btn-enter:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,107,157,0.4);
}
.entrance-card .error {
  color: #e74c3c; font-size: 0.85rem;
  margin-top: 0.5rem; min-height: 1.2em;
}

/* ====== Main Page ====== */
#main {
  display: none;
  padding-bottom: 80px;
}
#main.show { display: block; }

/* Tabs */
.tabs {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: center; gap: 0.5rem;
  padding: 1rem; background: rgba(255,245,247,0.9);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid #ffd0de;
}
.tab-btn {
  padding: 0.6rem 1.4rem;
  border: none; background: transparent;
  font-size: 0.95rem; color: var(--text-muted);
  cursor: pointer; border-radius: 50px;
  transition: all 0.3s; font-family: inherit;
}
.tab-btn:hover { color: var(--pink); background: rgba(255,107,157,0.08); }
.tab-btn.active {
  background: var(--pink); color: white;
  box-shadow: 0 2px 10px rgba(255,107,157,0.25);
}

.tab-content { display: none; padding: 2rem 1.5rem; max-width: 800px; margin: 0 auto; }
.tab-content.active { display: block; animation: fadeIn 0.4s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ====== Home Tab ====== */
.home-hero {
  text-align: center; padding: 2rem 0;
}
.home-hero h2 {
  font-size: 2.2rem; color: var(--dark);
  margin-bottom: 0.5rem; letter-spacing: 2px;
}
.home-hero .days-badge {
  display: inline-block; margin-top: 1rem;
  background: linear-gradient(135deg, var(--pink), var(--dark));
  color: white; padding: 1.2rem 2.5rem;
  border-radius: 20px; box-shadow: var(--shadow);
}
.home-hero .days-badge .number {
  font-size: 3rem; font-weight: 700; line-height: 1;
}
.home-hero .days-badge .label {
  font-size: 1rem; opacity: 0.9; margin-top: 0.3rem;
}
.home-message {
  margin-top: 2.5rem; text-align: center;
  font-size: 1.1rem; color: var(--text-muted);
  line-height: 2; letter-spacing: 1px;
}
.home-photo-preview {
  text-align: center; margin-top: 2rem;
}
.home-photo-preview img {
  width: 180px; height: 180px; object-fit: cover;
  border-radius: 50%; border: 4px solid var(--pink-light);
  box-shadow: var(--shadow);
}

/* ====== Timeline Tab ====== */
.timeline {
  position: relative; padding: 1rem 0;
}
.timeline::before {
  content: ""; position: absolute; left: 28px; top: 0; bottom: 0;
  width: 2px; background: linear-gradient(to bottom, var(--pink-light), var(--pink));
  border-radius: 1px;
}
.timeline-item {
  position: relative; padding-left: 70px; margin-bottom: 2.5rem;
  animation: fadeInUp 0.6s ease backwards;
}
.timeline-item:nth-child(1) { animation-delay: 0.1s; }
.timeline-item:nth-child(2) { animation-delay: 0.3s; }

.timeline-dot {
  position: absolute; left: 18px; top: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--pink); border: 4px solid var(--pink-bg);
  box-shadow: 0 0 0 3px var(--pink-light);
  z-index: 1;
}
.timeline-date {
  font-size: 0.9rem; color: var(--pink); font-weight: 600;
  margin-bottom: 0.5rem;
}
.timeline-card {
  background: var(--white); border-radius: var(--radius);
  padding: 1.5rem; box-shadow: var(--shadow);
  border-left: 3px solid var(--pink-light);
}
.timeline-card h3 {
  font-size: 1.15rem; color: var(--dark);
  margin-bottom: 0.4rem;
}
.timeline-card .days-count {
  display: inline-block; margin-top: 0.5rem;
  background: var(--pink-bg); color: var(--pink);
  padding: 0.3rem 1rem; border-radius: 50px;
  font-size: 0.9rem; font-weight: 600;
}

/* ====== Gallery Tab ====== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1rem;
}
.gallery-item {
  aspect-ratio: 1; overflow: hidden; border-radius: 12px;
  cursor: pointer; box-shadow: var(--shadow);
  transition: transform 0.3s;
}
.gallery-item:hover { transform: scale(1.03); }
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.3s;
}
.gallery-item:hover img { transform: scale(1.08); }

/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.9);
  align-items: center; justify-content: center;
}
.lightbox.show { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 85vh;
  border-radius: 8px; object-fit: contain;
}
.lightbox-close {
  position: absolute; top: 1.5rem; right: 2rem;
  font-size: 2rem; color: white; cursor: pointer;
  background: none; border: none; z-index: 1;
}

/* ====== Messages Tab ====== */
.message-card {
  background: var(--white); border-radius: var(--radius);
  padding: 2rem; box-shadow: var(--shadow);
  line-height: 2; font-size: 1.05rem;
  text-align: center; letter-spacing: 1px;
}
.message-card p { margin-bottom: 1rem; }
.message-card .signature {
  text-align: right; color: var(--pink);
  font-weight: 600; margin-top: 1.5rem;
}

/* ====== Music Player ====== */
.music-player {
  position: fixed; bottom: 1rem; right: 1rem;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
  border-radius: 50px; padding: 0.6rem 1.2rem;
  box-shadow: var(--shadow); z-index: 200;
  display: flex; align-items: center; gap: 0.6rem;
  cursor: pointer; user-select: none;
  border: 1px solid #ffd0de;
}
.music-player .music-icon {
  font-size: 1.3rem; transition: transform 0.3s;
}
.music-player.playing .music-icon {
  animation: pulse 1s ease infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}
.music-player .music-text {
  font-size: 0.8rem; color: var(--text-muted);
}

/* ====== Petals ====== */
.petal {
  position: fixed; pointer-events: none; z-index: 50;
  animation: fall linear forwards;
}
@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 0.9; }
  80% { opacity: 0.6; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
}

/* ====== Responsive ====== */
@media (max-width: 600px) {
  .tabs { gap: 0.2rem; padding: 0.7rem 0.5rem; }
  .tab-btn { padding: 0.5rem 1rem; font-size: 0.85rem; }
  .home-hero h2 { font-size: 1.6rem; }
  .home-hero .days-badge .number { font-size: 2.2rem; }
  .gallery { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.6rem; }
  .timeline { padding-left: 0; }
  .timeline::before { left: 18px; }
  .timeline-item { padding-left: 50px; }
  .timeline-dot { left: 8px; }
}
</style>
</head>
<body>

<!-- ====== Entrance ====== -->
<div id="entrance">
  <div class="entrance-card">
    <div class="hearts">💕</div>
    <h1>小兴子 & 小婷宝</h1>
    <label for="date-input">你们是哪一天在一起的？</label>
    <input type="date" id="date-input">
    <div class="error" id="date-error"></div>
    <button class="btn-enter" onclick="enterMain()">💝 进入我们的世界</button>
  </div>
</div>

<!-- ====== Main ====== -->
<div id="main">
  <nav class="tabs">
    <button class="tab-btn active" onclick="switchTab('home')">💕 首页</button>
    <button class="tab-btn" onclick="switchTab('timeline')">⏳ 时间线</button>
    <button class="tab-btn" onclick="switchTab('gallery')">🖼️ 照片墙</button>
    <button class="tab-btn" onclick="switchTab('messages')">💌 悄悄话</button>
  </nav>

  <!-- Home -->
  <div class="tab-content active" id="tab-home">
    <div class="home-hero">
      <h2>小兴子 💕 小婷宝</h2>
      <div class="days-badge">
        <div class="number" id="together-days">0</div>
        <div class="label">我们已经在一起</div>
      </div>
    </div>
    <div class="home-photo-preview">
      <img src="images/2627da234e277ff019b63782fd98a997.jpg" alt="us" onerror="this.style.display='none'">
    </div>
    <div class="home-message">
      <p>从相识到相知，从相知到相爱</p>
      <p>每一天都是最好的礼物 🎁</p>
      <p>谢谢你出现在我的生命里 ✨</p>
    </div>
  </div>

  <!-- Timeline -->
  <div class="tab-content" id="tab-timeline">
    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-date">2025年12月2日</div>
        <div class="timeline-card">
          <h3>💫 初次相识</h3>
          <p>那一天，我们的故事开始了</p>
          <span class="days-count" id="known-days">已经认识 0 天</span>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-date" id="together-date-display"></div>
        <div class="timeline-card">
          <h3>💝 正式在一起</h3>
          <p>从此，心里住进了一个你</p>
          <span class="days-count" id="together-days-timeline">已经在一起 0 天</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Gallery -->
  <div class="tab-content" id="tab-gallery">
    <div class="gallery" id="gallery-grid"></div>
  </div>

  <!-- Messages -->
  <div class="tab-content" id="tab-messages">
    <div class="message-card">
      <p>亲爱的小婷宝：</p>
      <p>遇见你是我最大的幸运 💕</p>
      <p>和你在一起的每一天都闪闪发光</p>
      <p>未来的路，我们一起慢慢走</p>
      <p>—— 永远爱你的小兴子</p>
      <div class="signature">💌</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">&times;</button>
  <img src="" alt="" id="lightbox-img">
</div>

<!-- Music Player -->
<div class="music-player" id="music-player" onclick="toggleMusic()" title="点击播放/暂停音乐">
  <span class="music-icon">🎵</span>
  <span class="music-text" id="music-text">播放音乐</span>
</div>

<script>
// ====== Constants ======
const KNOWN_DATE = new Date(2025, 11, 2);  // 相识: 2025-12-02 (month is 0-indexed)
const STORAGE_KEY = "together_date";

const PHOTOS = [
  "2627da234e277ff019b63782fd98a997.jpg",
  "324a934798d41d1a0236b9a5d03adbb5.jpg",
  "50b5946960589d0adb42af017efc16cd.jpg",
  "5b1cacbb6369a1ecef5b47e3350b6365.jpg",
  "672bbc44a2f5fc4eda3f5261eb735b44.jpg",
  "78a3bd955a409200717b4cc227a44277.jpg",
  "89c667970752bc5fdce46206eaf3f5ba.jpg",
  "a6ff4d82025fa680a42203bf8fd29779.jpg",
  "b244f2705391629ca7018729e46eb8a2.jpg",
  "f4225ed8e6941d8cb97886238c9269ac.jpg"
];

// ====== State ======
let togetherDate = null;
let currentTab = "home";

// ====== Init ======
function init() {
  buildGallery();
  createPetals();

  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    togetherDate = new Date(saved);
    if (!isNaN(togetherDate.getTime())) {
      showMain();
      return;
    }
  }
  // Show entrance
  document.getElementById("entrance").classList.remove("hidden");
}

// ====== Entrance ======
function enterMain() {
  const input = document.getElementById("date-input");
  const error = document.getElementById("date-error");
  const val = input.value;

  if (!val) {
    error.textContent = "请选择一个日期 💕";
    return;
  }

  const date = new Date(val + "T00:00:00");
  if (isNaN(date.getTime())) {
    error.textContent = "日期格式不对哦，再试一次";
    return;
  }

  if (date > new Date()) {
    error.textContent = "未来的日期？时光机还没发明呢 😄";
    return;
  }

  togetherDate = date;
  localStorage.setItem(STORAGE_KEY, val);
  showMain();
}

function showMain() {
  document.getElementById("entrance").classList.add("hidden");
  const main = document.getElementById("main");
  main.classList.add("show");

  // Update timeline date display
  const d = togetherDate;
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  document.getElementById("together-date-display").textContent =
    y + "年" + m + "月" + day + "日";

  updateCounters();
  setInterval(updateCounters, 60000); // update every minute
}

// ====== Counter Updates ======
function daysBetween(d1, d2) {
  const ms = d2.getTime() - d1.getTime();
  return Math.floor(ms / (1000 * 60 * 60 * 24));
}

function updateCounters() {
  if (!togetherDate) return;
  const now = new Date();

  const togetherDays = daysBetween(togetherDate, now);
  const knownDays = daysBetween(KNOWN_DATE, now);

  document.getElementById("together-days").textContent = togetherDays;
  document.getElementById("together-days-timeline").textContent =
    "已经在一起 " + togetherDays + " 天";
  document.getElementById("known-days").textContent =
    "已经认识 " + knownDays + " 天";
}

// ====== Tab Switching ======
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

  document.querySelector(`.tab-btn[onclick*="switchTab('${tab}')"]`).classList.add("active");
  document.getElementById("tab-" + tab).classList.add("active");
}

// ====== Gallery ======
function buildGallery() {
  const grid = document.getElementById("gallery-grid");
  PHOTOS.forEach(photo => {
    const div = document.createElement("div");
    div.className = "gallery-item";
    div.onclick = (e) => { e.stopPropagation(); openLightbox(photo); };
    const img = document.createElement("img");
    img.src = "images/" + photo;
    img.alt = "我们的照片";
    img.loading = "lazy";
    div.appendChild(img);
    grid.appendChild(div);
  });
}

function openLightbox(photo) {
  const lb = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  img.src = "images/" + photo;
  lb.classList.add("show");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("show");
}

// ====== Petals ======
function createPetals() {
  const colors = ["#ffb6c1", "#ff9ab5", "#ffc0cb", "#ffd1dc", "#ffe4e1", "#fff0f5"];
  setInterval(() => {
    const petal = document.createElement("div");
    petal.className = "petal";
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.top = "-5vh";
    petal.style.width = (8 + Math.random() * 14) + "px";
    petal.style.height = (8 + Math.random() * 14) + "px";
    petal.style.background = colors[Math.floor(Math.random() * colors.length)];
    petal.style.borderRadius = Math.random() > 0.5 ? "50%" : "50% 0 50% 50%";
    petal.style.animationDuration = (8 + Math.random() * 12) + "s";
    petal.style.animationDelay = Math.random() * 5 + "s";
    document.body.appendChild(petal);

    setTimeout(() => petal.remove(), 20000);
  }, 400);
}

// ====== Music Player ======
const AUDIO_URL = "%E6%9D%8E%E8%8D%A3%E6%B5%A9%20-%20%E6%81%8B%E4%BA%BA%20(2025%E9%BB%91%E9%A9%AC%E4%B8%96%E7%95%8C%E5%B7%A1%E5%9B%9E%E6%BC%94%E5%94%B1%E4%BC%9A%E5%90%88%E8%82%A5%E7%AB%99).ogg";
let audio = null;
let musicPlaying = false;

function initAudio() {
  if (audio) return;
  audio = new Audio(AUDIO_URL);
  audio.loop = true;
  audio.volume = 0.4;
}

function toggleMusic() {
  initAudio();
  const player = document.getElementById("music-player");
  const text = document.getElementById("music-text");

  if (musicPlaying) {
    audio.pause();
    player.classList.remove("playing");
    text.textContent = "播放音乐";
    musicPlaying = false;
  } else {
    audio.play().catch(() => {
      text.textContent = "加载中...";
    });
    audio.addEventListener("play", () => {
      player.classList.add("playing");
      text.textContent = "暂停音乐";
      musicPlaying = true;
    }, { once: true });
    player.classList.add("playing");
    text.textContent = "暂停音乐";
    musicPlaying = true;
  }
}

// ====== Keyboard ======
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeLightbox();
});

// ====== Start ======
init();
</script>
</body>
</html>
